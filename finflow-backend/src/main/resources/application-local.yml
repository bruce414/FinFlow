app:
  frontend:
    dashboard-url: http://localhost:5173/app
    complete-profile-url: http://localhost:5173/complete-profile

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB:finflowbackend}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    baseline-on-migrate: false

  jpa:
    show-sql: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ul.html