# This profile is used in AWS Elastic Beanstalk production.
app:
  security:
    # Option B deployment: frontend and backend on separate subdomains.
    # Example: https://app.finflow.example
    allowed-origin-patterns: ${APP_SECURITY_ALLOWED_ORIGIN_PATTERNS}
  frontend:
    dashboard-url: ${APP_FRONTEND_DASHBOARD_URL}
    complete-profile-url: ${APP_FRONTEND_COMPLETE_PROFILE_URL}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    baseline-on-migrate: false
  jpa:
    show-sql: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
  servlet:
    session:
      cookie:
        secure: true
        http-only: true
        # Required when frontend and backend are on different origins.
        same-site: none

server:
  forward-headers-strategy: framework

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
